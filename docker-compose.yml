x-runner-base: &runner-base
  image: brainiac/local-github-runner
  restart: unless-stopped
  volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    - sql_unit_report:/home/docker/sql-report-vol
    - ./sql-unit-reports:/home/docker/sql-unit-reports
  networks:
    - sonarnet

x-runner-env: &runner-env
  GITHUB_OWNER: ${GITHUB_OWNER}
  ACCESS_TOKEN: ${GH_RUNNER_TOKEN}
  SONAR_HOST: http://sonarqube:9000
  SONAR_ADMIN_PASS: ${SONAR_ADMIN_PASS}
  CONNECTION_NAME: ${CONNECTION_NAME}
  SNOW_CONFIG_B64: ${SNOW_CONFIG_B64:-}

services:
  sonarqube:
    image: brainiac/sonarqube
    container_name: sonarqube
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SONAR_JDBC_USERNAME: ${SONAR_JDBC_USERNAME}
      SONAR_JDBC_PASSWORD: ${SONAR_JDBC_PASSWORD}
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - sonarnet

  db:
    image: postgres:17.5
    container_name: sonarqube_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgresql:/var/lib/postgresql/data
      - ./backup:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sonarnet

  runner1:
    <<: *runner-base
    container_name: github-runner-org-${GITHUB_ORG}-1
    depends_on:
      sonarqube:
        condition: service_healthy
    environment:
      <<: *runner-env
      RUNNER_SCOPE: org
      GITHUB_OWNER: ${GITHUB_ORG}
      ACCESS_TOKEN: ${GH_ORG_TOKEN}
      RUNNER_NAME: runner-org-${GITHUB_ORG}-1
      RUNNER_WORKDIR: /_work/runner-org-${GITHUB_ORG}-1
      GITHUB_REPO: ""
      LABELS: runner-org-${GITHUB_ORG}
      PROJECT_KEY: org-${GITHUB_ORG}
      DISABLE_AUTOMATIC_DEREGISTRATION: "true"
      CONFIGURED_ACTIONS_RUNNER_FILES_DIR: /actions-runner-config/org-${GITHUB_ORG}-1
      UNSET_CONFIG_VARS: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - runner_config_1:/actions-runner-config/org-${GITHUB_ORG}-1
      - sql_unit_report:/home/docker/sql-report-vol
      - ./sql-unit-reports:/home/docker/sql-unit-reports

  runner2:
    <<: *runner-base
    container_name: github-runner-org-${GITHUB_ORG}-2
    depends_on:
      sonarqube:
        condition: service_healthy
    environment:
      <<: *runner-env
      RUNNER_SCOPE: org
      GITHUB_OWNER: ${GITHUB_ORG}
      ACCESS_TOKEN: ${GH_ORG_TOKEN}
      RUNNER_NAME: runner-org-${GITHUB_ORG}-2
      RUNNER_WORKDIR: /_work/runner-org-${GITHUB_ORG}-2
      GITHUB_REPO: ""
      LABELS: runner-org-${GITHUB_ORG}
      PROJECT_KEY: org-${GITHUB_ORG}
      DISABLE_AUTOMATIC_DEREGISTRATION: "true"
      CONFIGURED_ACTIONS_RUNNER_FILES_DIR: /actions-runner-config/org-${GITHUB_ORG}-2
      UNSET_CONFIG_VARS: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - runner_config_2:/actions-runner-config/org-${GITHUB_ORG}-2
      - sql_unit_report:/home/docker/sql-report-vol
      - ./sql-unit-reports:/home/docker/sql-unit-reports


  nginx-server:
    image: nginx
    container_name: nginx-server
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - sql_unit_report:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - sonarnet

volumes:
  sonarqube_data:
  sonarqube_extensions:
  postgresql:
  runner_config_1:
  runner_config_2:

  sql_unit_report:
    name: sql_unit_report

networks:
  sonarnet:
