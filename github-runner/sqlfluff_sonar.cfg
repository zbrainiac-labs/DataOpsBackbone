[sqlfluff]
dialect = snowflake
templater = raw
max_line_length = 200

# ============================================================
# Rule ownership: SonarQube vs SQLFluff (no duplicates)
# ============================================================
# SonarQube txt: plugin  -> safety, security, naming, data types, deps, keywords UPPER
# SonarQube SQLCC:        -> SELECT *, non-sargable, cartesian joins, NULL comparisons, views
# SQLFluff (this config)  -> formatting, AST-based style, implicit aliases
# ============================================================

# Exclude PRS (parse errors on DEFINE syntax) and all rules covered by SonarQube
exclude_rules = PRS, CP01, AM01, CV11

# Exclude DEFINE files from SQLFluff (they use non-standard syntax)
[sqlfluff:templater:raw]

[sqlfluff:rules:capitalisation.identifiers]
capitalisation_policy = upper

[sqlfluff:rules:convention.select_trailing_comma]
select_clause_trailing_comma = forbid

[sqlfluff:rules:layout.select_targets]
wildcard_policy = single
